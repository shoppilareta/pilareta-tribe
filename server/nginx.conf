# ============================================
# Pilareta Tribe - Nginx Configuration
# ============================================
# Copy this file to: /etc/nginx/conf.d/tribe.conf
# Test with: sudo nginx -t
# Reload with: sudo systemctl reload nginx
# ============================================

server {
    listen 80;
    server_name tribe.pilareta.com;

    # Uncomment after SSL setup to redirect HTTP to HTTPS
    # return 301 https://$server_name$request_uri;

    # Upload size limit (110MB for exercise videos, 10MB for most other uploads)
    client_max_body_size 110M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    gzip_min_length 1000;

    # Proxy to Next.js application
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static assets - serve directly from disk
    location /_next/static {
        alias /var/www/pilareta-tribe/.next/static;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # Public assets
    location /public {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=86400";
    }

    # Uploads: rewrite /uploads/... to /api/uploads/... so the serving route handles them
    # (supports both legacy URLs stored before the /api/ prefix fix and new URLs)
    location /uploads {
        rewrite ^/uploads/(.*)$ /api/uploads/$1 last;
    }

    # Uploads API route
    location /api/uploads {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=86400";
    }
}

# SSL/HTTPS is managed by Certbot on the server.
# Certbot automatically modifies this file to add SSL configuration.
# Do not add SSL directives manually.
